id: release
version: 2
name: Release Flow
description: 发布流程。plan → review → release → verification，无 implementation。

entry: plan
terminal: done

steps:
  office-hours:
    owner: planner
    min_depth: thorough
    next: plan

  plan:
    owner: planner
    min_depth: quick
    outputs:
      - task.md
      - plan.md
    checkpoint: true
    next: review

  review:
    owner: reviewer
    min_depth: quick
    outputs:
      - review.md
    next: release
    transitions:
      approved: release
      changes_requested: plan

  release:
    owner: planner
    min_depth: quick
    next: verification
    on_blocked: blocked

  blocked:
    owner: current_agent
    min_depth: quick
    resume_to: release

  verification:
    owner: tester
    min_depth: quick
    next: ship
    transitions:
      passed: ship
      failed: release

  ship:
    owner: planner
    min_depth: full
    checkpoint: true
    next: done

  done:
    owner: planner
    min_depth: quick
    outputs:
      - handoff.md

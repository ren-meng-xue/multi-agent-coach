id: feature
version: 2
name: Feature Flow
description: 新功能开发，支持 4 档深度

entry: plan
terminal: done

steps:
  # ── 需求阶段 ──
  office-hours:
    owner: planner
    min_depth: thorough
    next: spec

  spec:
    owner: spec-planner
    min_depth: thorough
    outputs:
      - spec.md
    next: plan

  plan:
    owner: spec-planner
    min_depth: quick
    outputs:
      - task.md
      - plan.md
    checkpoint: true
    next: eng-review

  # ── 计划评审阶段 ──
  eng-review:
    owner: reviewer
    min_depth: thorough
    next: ceo-review

  ceo-review:
    owner: reviewer
    min_depth: full
    next: design-review

  design-review:
    owner: reviewer
    min_depth: full
    next: conflict-resolution

  conflict-resolution:
    owner: planner
    min_depth: full
    checkpoint: true
    next: implementation

  # ── 实现阶段 ──
  implementation:
    owners:
      - backend
      - frontend
    mode: parallel
    dynamic_owners: true
    min_depth: quick
    next: review
    on_blocked: blocked

  blocked:
    owner: current_agent
    min_depth: quick
    resume_to: implementation

  # ── 审查阶段 ──
  review:
    owner: reviewer
    min_depth: quick
    outputs:
      - review.md
    next: qa
    transitions:
      approved: qa
      changes_requested: implementation

  # ── 测试阶段 ──
  qa:
    owner: tester
    min_depth: standard
    next: ship
    transitions:
      passed: ship
      failed: implementation

  # ── 发布阶段 ──
  ship:
    owner: planner
    min_depth: full
    checkpoint: true
    next: done

  # ── 终止 ──
  done:
    owner: planner
    min_depth: quick
    outputs:
      - handoff.md

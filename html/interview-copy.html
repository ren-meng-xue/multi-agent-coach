<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>多 Agent 面试追踪系统 · Multi-Agent Coach Interview</title>
<!-- 引入 Tabler Icons 支持 trace-panel 图标 -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  :root {
    --font-mono: "JetBrains Mono", "Fira Code", "Courier New", monospace;
    --font-sans: "Outfit", "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    
    --bg: #ffffff;
    --bg-secondary: #f7f6f2;
    --fg: #1a1a18;
    --muted: #5a5a56;
    --muted-light: #9a9990;
    --border: rgba(0, 0, 0, 0.1);
    --border-secondary: rgba(0, 0, 0, 0.18);
    --accent-gradient: linear-gradient(135deg, #534ab7 0%, #7c3aed 100%);
    
    /* 玫瑰金评估专属色谱 */
    --rose-gold-gradient: linear-gradient(135deg, #f43f5e 0%, #fda4af 50%, #fb7185 100%);
    --rose-gold-bg: rgba(244, 63, 94, 0.05);
    --rose-gold-border: rgba(244, 63, 94, 0.15);
    
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
    --shadow-md: 0 4px 20px -2px rgba(83, 74, 183, 0.06), 0 2px 8px -1px rgba(83, 74, 183, 0.04);
    --shadow-lg: 0 10px 30px -5px rgba(0,0,0,0.05), 0 8px 18px -6px rgba(0,0,0,0.03);
    
    --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg-secondary: #252523;
      --fg: #e8e6de;
      --muted: #9a9890;
      --muted-light: #6a6860;
      --border: rgba(255, 255, 255, 0.1);
      --border-secondary: rgba(255, 255, 255, 0.18);
      --rose-gold-bg: rgba(244, 63, 94, 0.1);
      --rose-gold-border: rgba(244, 63, 94, 0.25);
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: var(--font-sans);
    background-color: var(--bg);
    color: var(--fg);
    height: 100vh;
    display: flex;
    justify-content: center;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  
  .app-container {
    width: 100%;
    max-width: 960px;
    display: flex;
    flex-direction: column;
    height: 100vh;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    background: var(--bg);
    position: relative;
  }
  
  /* 极光背景微光 */
  .bg-glow {
    position: absolute;
    width: 350px;
    height: 350px;
    background: radial-gradient(circle, rgba(83, 74, 183, 0.08) 0%, rgba(244, 63, 94, 0.04) 50%, transparent 100%);
    top: 20%;
    right: 5%;
    pointer-events: none;
    z-index: 1;
    filter: blur(40px);
  }

  /* --- 头部 --- */
  header {
    height: 64px;
    padding: 0 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg);
    z-index: 10;
    flex-shrink: 0;
  }
  
  .brand {
    font-weight: 900;
    font-size: 16px;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #534ab7, #e11d48);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  
  .status {
    font-size: 11px;
    font-weight: 700;
    color: #1d9e75;
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(29, 158, 117, 0.08);
    padding: 4px 10px;
    border-radius: 12px;
  }
  
  .status::before {
    content: "";
    width: 6px;
    height: 6px;
    background: #1d9e75;
    border-radius: 50%;
    animation: pulse 1.4s ease-in-out infinite;
  }

  /* --- 聊天流 --- */
  .chat-flow {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 32px;
    z-index: 5;
    scroll-behavior: smooth;
  }

  /* 隐藏滚动条但保留功能 */
  .chat-flow::-webkit-scrollbar {
    width: 6px;
  }
  .chat-flow::-webkit-scrollbar-track {
    background: transparent;
  }
  .chat-flow::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 3px;
  }
  
  .msg-row {
    display: flex;
    width: 100%;
    animation: fadeIn 0.4s ease forwards;
  }
  
  .msg-row.user {
    justify-content: flex-end;
  }

  .msg-row.assistant {
    justify-content: flex-start;
  }
  
  .msg-body {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    max-width: 85%;
  }

  .user .msg-body {
    align-items: flex-end;
    max-width: 75%;
  }
  
  .bubble {
    padding: 14px 18px;
    border-radius: 18px;
    font-size: 14.5px;
    line-height: 1.6;
    box-shadow: var(--shadow-sm);
  }
  
  .user .bubble {
    background: var(--accent-gradient);
    color: white;
    border-top-right-radius: 4px;
    box-shadow: 0 4px 15px rgba(83, 74, 183, 0.15);
  }
  
  .assistant .bubble {
    background: var(--bg-secondary);
    color: var(--fg);
    border: 0.5px solid var(--border);
    border-top-left-radius: 4px;
  }

  /* --- 专家组 Trace 面板 (完美集成 trace-panel_1.html) --- */
  .trace-panel-wrapper {
    margin-top: 8px;
    width: 100%;
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }

  /* Topbar */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 0.5px solid var(--border);
    background: var(--bg-secondary);
  }
  .topbar-left { display: flex; align-items: center; gap: 8px; }
  .live-dot {
    width: 7px; height: 7px; border-radius: 50%; background: #1D9E75;
    animation: pulse 1.4s ease-in-out infinite;
  }
  .topbar-title { font-size: 13px; font-weight: 500; color: var(--fg); }
  .topbar-elapsed { font-size: 11px; color: var(--muted-light); font-family: var(--font-mono); }

  /* Phase tabs */
  .phase-tabs {
    display: flex;
    border-bottom: 0.5px solid var(--border);
    background: var(--bg);
  }
  .tab {
    padding: 8px 18px;
    font-size: 12px;
    color: var(--muted-light);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all .2s;
    user-select: none;
  }
  .tab.active { color: #534AB7; border-bottom-color: #534AB7; font-weight: 500; }

  /* Trace body */
  .trace-body { padding: 16px; display: flex; flex-direction: column; gap: 0; }

  /* Each row */
  .trow {
    display: flex;
    align-items: flex-start;
    position: relative;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity .35s ease, transform .35s ease;
  }
  .trow.visible { opacity: 1; transform: translateY(0); }

  .vline {
    display: none;
    position: absolute;
    left: 11px; top: 24px;
    width: 1.5px; bottom: 0;
    background: var(--border);
    transition: background .4s;
  }
  .trow:not(:last-child) .vline { display: block; }
  .trow.done .vline { background: #9FE1CB; }
  .trow.active .vline { background: #AFA9EC; }

  .node {
    width: 23px; height: 23px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; z-index: 1;
    margin-right: 10px; margin-top: 2px;
    transition: all .3s;
    border: 1.5px solid var(--border-secondary);
    background: var(--bg-secondary);
  }
  .node.done { background: #E1F5EE; border-color: #1D9E75; }
  .node.active {
    background: #EEEDFE; border-color: #534AB7;
    animation: nodeglow 1.3s ease-in-out infinite;
  }
  .node.wait { background: var(--bg-secondary); border-color: var(--border-secondary); }
  @keyframes nodeglow {
    0%,100%{ box-shadow: 0 0 0 0 rgba(83,74,183,.25); }
    50%{ box-shadow: 0 0 0 5px rgba(83,74,183,.08); }
  }
  .node i { font-size: 10px; }
  .node.done i { color: #1D9E75; }
  .node.active i { color: #534AB7; }
  .node.wait i { color: var(--muted-light); }

  /* Content */
  .content { flex: 1; padding-bottom: 16px; }
  .row-top {
    display: flex; align-items: center;
    gap: 6px; flex-wrap: wrap;
  }

  /* Badges */
  .badge {
    display: inline-flex; padding: 1px 7px;
    border-radius: 4px; font-size: 10px; font-weight: 500; flex-shrink: 0;
  }
  .b-master  { background: #EEEDFE; color: #3C3489; }
  .b-agent   { background: #E1F5EE; color: #085041; }
  .b-tool    { background: #FAEEDA; color: #633806; }
  .b-mcp     { background: #FAECE7; color: #712B13; }
  .b-eval    { background: #EAF3DE; color: #27500A; }

  @media (prefers-color-scheme: dark) {
    .b-master  { background: #26215C; color: #CECBF6; }
    .b-agent   { background: #04342C; color: #9FE1CB; }
    .b-tool    { background: #412402; color: #FAC775; }
    .b-mcp     { background: #4A1B0C; color: #F0997B; }
    .b-eval    { background: #173404; color: #C0DD97; }
  }

  .row-label {
    font-size: 13px; color: var(--fg);
    display: flex; align-items: center; gap: 4px;
  }
  .row-label.muted { color: var(--muted-light); }
  .ms { font-size: 10px; color: var(--muted-light); margin-left: auto; font-family: var(--font-mono); }

  /* Type labels */
  .type-label {
    display: inline-flex; padding: 1px 6px;
    border-radius: 3px; font-size: 10px;
    border: 0.5px solid var(--border);
    color: var(--muted-light);
    margin-left: auto; flex-shrink: 0;
  }
  .type-label.agent-type { color: #085041; border-color: #5DCAA5; background: #E1F5EE; }
  .type-label.tool-type  { color: #633806; border-color: #EF9F27; background: #FAEEDA; }
  .type-label.mcp-type   { color: #712B13; border-color: #F0997B; background: #FAECE7; }

  @media (prefers-color-scheme: dark) {
    .type-label.agent-type { background: #04342C; color: #9FE1CB; }
    .type-label.tool-type  { background: #412402; color: #FAC775; }
    .type-label.mcp-type   { background: #4A1B0C; color: #F0997B; }
  }

  /* Sub rows */
  .sub-rows { margin-top: 5px; display: flex; flex-direction: column; gap: 4px; }
  .srow {
    display: flex; align-items: flex-start;
    gap: 7px; font-size: 12px;
    color: var(--muted); line-height: 1.4;
  }
  .sdot {
    width: 5px; height: 5px; border-radius: 50%;
    flex-shrink: 0; margin-top: 4px;
  }
  .sdot.done    { background: #1D9E75; }
  .sdot.run     { background: #534AB7; animation: pulse .9s infinite; }
  .sdot.wait    { background: var(--border-secondary); }

  /* Inline tags */
  .tag-sm {
    display: inline-flex; padding: 0 5px;
    border-radius: 3px; font-size: 10px; font-weight: 500; margin: 0 2px;
  }
  .t-err    { background: #FCEBEB; color: #791F1F; }
  .t-retry  { background: #FAEEDA; color: #633806; }
  .t-ok     { background: #E1F5EE; color: #085041; }

  @media (prefers-color-scheme: dark) {
    .t-err   { background: #501313; color: #F09595; }
    .t-retry { background: #412402; color: #FAC775; }
    .t-ok    { background: #04342C; color: #9FE1CB; }
  }

  /* Typing dots */
  .typing { display: inline-flex; gap: 3px; align-items: center; margin-left: 3px; }
  .typing span {
    width: 4px; height: 4px; border-radius: 50%;
    background: #534AB7; animation: tdot 1s ease-in-out infinite;
  }
  .typing span:nth-child(2) { animation-delay: .16s; }
  .typing span:nth-child(3) { animation-delay: .32s; }
  @keyframes tdot {
    0%,60%,100%{ transform: translateY(0); opacity: .35; }
    30%{ transform: translateY(-4px); opacity: 1; }
  }

  /* Parallel separator */
  .parallel-sep {
    display: flex; align-items: center;
    gap: 8px; margin: 4px 0 8px;
    font-size: 10px; color: var(--muted-light);
    opacity: 0; transition: opacity .4s;
  }
  .parallel-sep.visible { opacity: 1; }
  .sep-line { flex: 1; height: 1px; background: var(--border); }

  /* --- 玫瑰金 EVAL 评估面板 --- */
  .eval-panel {
    background: var(--rose-gold-bg);
    border: 1px solid var(--rose-gold-border);
    border-radius: var(--radius-lg);
    padding: 20px;
    margin-top: 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    box-shadow: 0 8px 32px rgba(244, 63, 94, 0.04);
    opacity: 0;
    transform: scale(0.95);
    animation: evalEnter 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }

  .eval-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .eval-title {
    font-weight: 800;
    font-size: 14px;
    color: #e11d48;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .eval-score-box {
    display: flex;
    align-items: baseline;
    gap: 4px;
    font-family: var(--font-mono);
  }

  .eval-number {
    font-size: 32px;
    font-weight: 900;
    background: var(--rose-gold-gradient);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .eval-max {
    font-size: 14px;
    color: var(--muted-light);
    font-weight: 700;
  }

  .eval-progress-container {
    height: 6px;
    background: rgba(244, 63, 94, 0.08);
    border-radius: 3px;
    overflow: hidden;
    position: relative;
  }

  .eval-progress-bar {
    height: 100%;
    background: var(--rose-gold-gradient);
    width: 0%;
    border-radius: 3px;
    transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .eval-details {
    display: flex;
    flex-direction: column;
    gap: 10px;
    font-size: 13px;
    border-top: 1px dashed rgba(244, 63, 94, 0.15);
    padding-top: 12px;
  }

  .eval-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    opacity: 0;
    transform: translateX(-8px);
  }

  .eval-item.fade-in {
    animation: slideInLeft 0.4s ease forwards;
  }

  .eval-item-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .eval-dot {
    width: 6px;
    height: 6px;
    background: #10b981;
    border-radius: 50%;
  }

  .eval-item-status {
    font-size: 11px;
    font-weight: 700;
    color: #10b981;
    background: rgba(16, 185, 129, 0.08);
    padding: 2px 8px;
    border-radius: 10px;
  }

  .eval-item-status.pending {
    color: var(--muted);
    background: rgba(100, 116, 139, 0.08);
  }

  /* --- 输入区域 --- */
  .input-pane {
    padding: 16px 24px 24px;
    border-top: 1px solid var(--border);
    background: var(--bg);
    z-index: 10;
    flex-shrink: 0;
  }
  
  .input-dock {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
  }
  
  .input-box {
    flex: 1;
    padding: 14px 20px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 24px;
    color: var(--fg);
    font-size: 14px;
    outline: none;
    transition: var(--transition);
  }
  
  .input-box::placeholder {
    color: var(--muted);
    opacity: 0.65;
  }
  
  .input-box:focus {
    border-color: #534ab7;
    background: var(--bg);
    box-shadow: 0 0 0 4px rgba(83, 74, 183, 0.12);
  }
  
  .send-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--bg-secondary);
    color: var(--muted);
    border: 1px solid var(--border);
    display: grid;
    place-items: center;
    cursor: not-allowed;
    opacity: 0.5;
    transition: var(--transition);
    flex-shrink: 0;
  }
  
  .send-btn.active {
    background: #534ab7;
    color: white;
    border-color: #534ab7;
    opacity: 1;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(83, 74, 183, 0.25);
  }
  
  .send-btn.active:hover {
    background: #40389f;
    transform: scale(1.05);
  }
  .send-btn.active:active {
    transform: scale(0.95);
  }

  /* --- 动效定义 --- */
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  
  @keyframes pulse {
    0% { transform: scale(0.95); opacity: 0.8; }
    50% { transform: scale(1.15); opacity: 1; }
    100% { transform: scale(0.95); opacity: 0.8; }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes evalEnter {
    to { opacity: 1; transform: scale(1); }
  }

  @keyframes slideInLeft {
    to { opacity: 1; transform: translateX(0); }
  }
</style>
</head>
<body>

<div class="app-container">
  <div class="bg-glow"></div>
  
  <header>
    <div class="brand">MULTI-AGENT INTERVIEW ROOM</div>
    <div class="status">ONLINE</div>
  </header>

  <div class="chat-flow" id="chatFlow">
    <div class="msg-row assistant">
      <div class="msg-body">
        <div class="bubble" id="welcomeBubble">你好！我是你的主控面试教练。今天，我已为你集结了 <b>岗位分析专家</b>、<b>记忆检索专家</b>、<b>真题库MCP协议</b>以及 <b>EVAL 量化评估 Agent</b>。我们将共同针对系统架构设计进行模拟实战。输入你的方案，我们将立即为你开辟时序 Trace 画布！</div>
      </div>
    </div>
  </div>

  <div class="input-pane">
    <div class="input-dock">
      <input type="text" class="input-box" id="userInput" placeholder="在此输入你的技术方案或模拟回答..." onkeydown="if(event.key==='Enter') sendMessage()" oninput="handleInput()">
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"></line>
          <polyline points="5 12 12 5 19 12"></polyline>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
  const chatFlow = document.getElementById('chatFlow');
  const userInput = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');

  let messageIndex = 0; // 用于区分不同的消息实例，以生成独立的 DOM 元素

  function handleInput() {
    const text = userInput.value.trim();
    if (text.length > 0) {
      sendBtn.classList.add('active');
      sendBtn.removeAttribute('disabled');
    } else {
      sendBtn.classList.remove('active');
      sendBtn.setAttribute('disabled', 'true');
    }
  }

  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  function appendUserMsg(text) {
    const row = document.createElement('div');
    row.className = 'msg-row user';
    row.innerHTML = `
      <div class="msg-body">
        <div class="bubble">${text}</div>
      </div>
    `;
    chatFlow.appendChild(row);
    chatFlow.scrollTop = chatFlow.scrollHeight;
  }

  // 创建符合 trace-panel_1.html 的全新时序 Trace 气泡结构 (无头像)
  function createAssistantTraceShell(msgId) {
    const row = document.createElement('div');
    row.className = 'msg-row assistant';
    row.innerHTML = `
      <div class="msg-body">
        <!-- 主控专家会商中 -->
        <div class="answer-text" id="answer-text-${msgId}" style="font-size:14.5px; min-height: 24px; color: var(--muted);">
          <span>[ 正在调度多 Agent 进行时序拓扑分析... ]</span>
        </div>
        
        <!-- 完美的 trace-panel 面板 -->
        <div class="trace-panel-wrapper" id="trace-panel-${msgId}">
          <div class="topbar">
            <div class="topbar-left">
              <div class="live-dot" id="live-dot-${msgId}"></div>
              <span class="topbar-title" id="topbar-title-${msgId}">专家组正在工作</span>
            </div>
            <span class="topbar-elapsed" id="elapsed-${msgId}">0.0s</span>
          </div>

          <div class="phase-tabs">
            <div class="tab active" id="tab-prepare-${msgId}">准备阶段</div>
            <div class="tab" id="tab-interview-${msgId}" style="opacity:.5">面试阶段</div>
          </div>

          <div class="trace-body" id="trace-body-${msgId}"></div>
        </div>
      </div>
    `;
    chatFlow.appendChild(row);
    chatFlow.scrollTop = chatFlow.scrollHeight;
    return row.querySelector('.msg-body');
  }

  // 精准还原 trace-panel_1.html 中的 8 大步骤定义
  function getStepsConfig(msgId) {

      },
      {

        label: '后台静默评分', ms: '', muted: true,
        subs: [{ state: 'wait', text: '结束后给出结构化反馈和进步对比' }]
      }
    ];
  }

  // 渲染单行 Trace (高度还原 trace-panel_1.html 中的 buildRow)
  function buildRowElement(step, msgId) {
    if (step.isSep) {
      const d = document.createElement('div');
      d.className = 'parallel-sep';
      d.id = `sep-parallel-${msgId}`;
      d.innerHTML = `<div class="sep-line"></div><span>用户回答后，以下两步同时运行</span><div class="sep-line"></div>`;
      return d;
    }

    const row = document.createElement('div');
    row.className = 'trow';
    row.id = 'row-' + step.id;

    let subHtml = '';
    (step.subs || []).forEach(s => {
      let content = '';
      if (s.tags) {
        s.tags.forEach(t => {
          const [cls, label] = t.split(':');
          content += `<span class="tag-sm ${cls}">${label}</span>`;
        });
        content += `<span style="margin-left:3px">${s.after || ''}</span>`;
      } else {
        content = s.text;
      }
      subHtml += `<div class="srow"><span class="sdot ${s.state}"></span><span>${content}</span></div>`;
    });

    const typingHtml = step.typing
      ? `<span class="typing"><span></span><span></span><span></span></span>` : '';
    const typeHtml = step.type
      ? `<span class="type-label ${step.type}">${step.typeText}</span>` : '';
    const msHtml = step.ms ? `<span class="ms">${step.ms}</span>` : '';
    const labelClass = step.muted ? 'row-label muted' : 'row-label';

    row.innerHTML = `
      <div class="vline"></div>
      <div class="node wait" id="node-${step.id}">
        <i class="ti ti-clock"></i>
      </div>
      <div class="content">
        <div class="row-top">
          <span class="badge ${step.badge}">${step.badgeText}</span>
          <span class="${labelClass}" id="label-${step.id}">${step.label}${typingHtml}</span>
          ${typeHtml}
          ${msHtml}
        </div>
        ${subHtml ? `<div class="sub-rows">${subHtml}</div>` : ''}
      </div>`;
    return row;
  }

  function activateRow(id) {
    const row = document.getElementById('row-' + id);
    const node = document.getElementById('node-' + id);
    if (!row || !node) return;
    row.className = 'trow active visible';
    node.className = 'node active';
    node.innerHTML = `<i class="ti ti-pencil"></i>`;
  }

  function completeRow(id) {
    const row = document.getElementById('row-' + id);
    const node = document.getElementById('node-' + id);
    if (!row || !node) return;
    row.className = 'trow done visible';
    node.className = 'node done';
    node.innerHTML = `<i class="ti ti-check"></i>`;
  }

  // 递增评估得分的缓动
  function animateScore(el, start, end, duration) {
    const range = end - start;
    let current = start;
    const increment = end > start ? 0.1 : -0.1;
    const stepTime = Math.abs(Math.floor(duration / (range * 10)));
    
    const timer = setInterval(() => {
      current += increment;
      if ((increment > 0 && current >= end) || (increment < 0 && current <= end)) {
        clearInterval(timer);
        el.textContent = end.toFixed(1);
      } else {
        el.textContent = current.toFixed(1);
      }
    }, stepTime);
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    // 递增消息索引，确保每一次会话的 ID 都是独立的
    messageIndex++;
    const currentMsgId = messageIndex;

    appendUserMsg(text);
    userInput.value = '';
    handleInput();

    // 1. 创建助手 Trace 外壳
    const msgBody = createAssistantTraceShell(currentMsgId);
    const traceBodyEl = document.getElementById(`trace-body-${currentMsgId}`);
    const elapsedEl = document.getElementById(`elapsed-${currentMsgId}`);
    const liveDotEl = document.getElementById(`live-dot-${currentMsgId}`);
    const topbarTitleEl = document.getElementById(`topbar-title-${currentMsgId}`);

    // 2. 启动右上角的计时器 (0.0s -> 5.2s 实时计时)
    let elapsedVal = 0;
    const elapsedTimer = setInterval(() => {
      elapsedVal = Math.min(elapsedVal + 0.1, 99.9);
      elapsedEl.textContent = elapsedVal.toFixed(1) + 's';
    }, 100);

    const steps = getStepsConfig(currentMsgId);

    // 3. 按照 trace-panel_1.html 中的延时与动作进行流式时序渲染
    steps.forEach((step, i) => {
      setTimeout(() => {
        const row = buildRowElement(step, currentMsgId);
        traceBodyEl.appendChild(row);
        chatFlow.scrollTop = chatFlow.scrollHeight;
        
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            if (!step.isSep) row.classList.add('visible');
          });
        });
      }, step.delay);

      if (!step.isSep) {
        setTimeout(() => activateRow(step.id), step.delay + 80);

        const noComplete = [`question-${currentMsgId}`, `interviewer-${currentMsgId}`, `eval-${currentMsgId}`];
        if (!noComplete.includes(step.id)) {
          const nextDelay = steps[i + 1] ? steps[i + 1].delay - 100 : step.delay + 600;
          setTimeout(() => completeRow(step.id), nextDelay);
        }
      }
    });

    // 4. 用户回答后分割线淡入
    setTimeout(() => {
      const sep = document.getElementById(`sep-parallel-${currentMsgId}`);
      if (sep) sep.classList.add('visible');
    }, 4350);

    // 5. 5.2 秒后完成准备阶段，计时器变更为“等待用户作答”
    await sleep(5200);
    clearInterval(elapsedTimer);
    liveDotEl.style.animation = 'none';
    liveDotEl.style.background = '#888';
    topbarTitleEl.textContent = '准备阶段分析完毕';
    elapsedEl.textContent = '等待用户作答';

    // 6. 主控 Agent 给出针对性的流式追问回复
    const answerTextEl = document.getElementById(`answer-text-${currentMsgId}`);
    answerTextEl.innerHTML = '';
    answerTextEl.style.color = 'var(--fg)';
    answerTextEl.style.fontWeight = '500';
    answerTextEl.style.lineHeight = '1.6';

    // 根据输入的问题进行智能回答匹配，让交互更加灵动逼真
    let responseTemplate = "";
    if (text.includes("锁") || text.toLowerCase().includes("redis") || text.toLowerCase().includes("redisson")) {
      responseTemplate = "您提到的分布式锁方案非常有深度。特别是在 Redisson 框架的 Watchdog (看门狗) 锁续期机制方面，很好地规避了业务执行超时锁提前释放的痛点。然而，如果在多节点高可用拓扑下，Redis 主从节点在同步分布式锁状态时发生了时钟漂移 (Clock Drift) 或者脑裂，您将如何保证红锁 (Redlock) 算法的安全性与一致性？\n\n<b>[EVAL 专家量化报告已实时评估生成]</b>";
    } else if (text.includes("哈希") || text.includes("hash") || text.toLowerCase().includes("consistent")) {
      responseTemplate = "在应对分布式路由场景下，您选择的一致性哈希 (Consistent Hashing) 是非常经典的做法。它将节点扩缩容引起的数据漂移缩减到了最小。但是，为了避免哈希环上物理节点分布不均导致严重的倾斜问题 (Hotspot)，您打算如何合理配置“虚拟节点 (Virtual Nodes)”的权重比例？在真实生产环境下，倾斜度容忍指标一般应该怎么设立？\n\n<b>[EVAL 专家量化报告已实时评估生成]</b>";
    } else {
      responseTemplate = "您的架构方案具备很好的拓展性！在利用多级缓存和分布式队列进行削峰填谷方面做得非常到位。但是，对于高吞吐系统的状态一致性保障，EVAL 专家对您提到的状态流转原子性提出了更高的审查要求。若某微服务在并发提交时发生脏读，您会考虑使用何种乐观锁或分布式协调器来兜底？\n\n<b>[EVAL 专家量化报告已实时评估生成]</b>";
    }

    let currentIndex = 0;
    function printText() {
      if (currentIndex < responseTemplate.length) {
        const char = responseTemplate[currentIndex];
        if (char === '\n') {
          answerTextEl.innerHTML += '<br>';
        } else {
          answerTextEl.innerHTML += char;
        }
        currentIndex++;
        chatFlow.scrollTop = chatFlow.scrollHeight;
        setTimeout(printText, 25);
      } else {
        // 7. 流式打字完成后，滑入玫瑰金 EVAL 实时评分面板
        showEvalPanel(msgBody);
      }
    }
    
    printText();
  }

  function showEvalPanel(parentContainer) {
    const evalPanel = document.createElement('div');
    evalPanel.className = 'eval-panel';
    evalPanel.innerHTML = `
      <div class="eval-top">
        <div class="eval-title">

        </div>

          <div class="eval-item-left">

          </div>
          <span class="eval-item-status pending">⏳ 待追加追问验证</span>
        </div>
      </div>
    `;
    
    parentContainer.appendChild(evalPanel);
    chatFlow.scrollTop = chatFlow.scrollHeight;

    // 触发玫瑰金百分百打分增量动效
    setTimeout(() => {
      const scoreEl = evalPanel.querySelector('#evalScore');
      const barEl = evalPanel.querySelector('#evalBar');
      
      animateScore(scoreEl, 0.0, 8.7, 1000);
      barEl.style.width = '87%';
      
      // 考点对齐细则逐一亮起
      const items = ['item1', 'item2', 'item3', 'item4'];
      items.forEach((id, idx) => {
        setTimeout(() => {
          const itemEl = evalPanel.querySelector(`#${id}`);
          if (itemEl) itemEl.classList.add('fade-in');
          chatFlow.scrollTop = chatFlow.scrollHeight;
        }, 300 + idx * 250);
      });
    }, 200);
  }

  // 页面加载时的自适应 iframe 处理及欢迎词流式输出
  window.addEventListener('DOMContentLoaded', async () => {
    // 隐藏 header 并去掉多余的边框，以高度融入 prototype-light 中的 iframe
    if (window.self !== window.top) {
      const headerEl = document.querySelector('header');
      if (headerEl) headerEl.style.display = 'none';
      const containerEl = document.querySelector('.app-container');
      if (containerEl) {
        containerEl.style.border = 'none';
        containerEl.style.height = '100vh';
      }
    }

    const welcomeBubble = document.getElementById('welcomeBubble');
    if (welcomeBubble) {
      const textToStream = "你好！我是你的主控面试教练。今天，我已为你集结了岗位分析专家、记忆检索专家、真题库MCP协议以及 EVAL 量化评估 Agent。我们将共同针对系统架构设计进行模拟实战。输入你的方案，我们将立即为你开辟时序 Trace 画布！";
      welcomeBubble.innerHTML = '';
      
      let charIdx = 0;
      async function streamWelcome() {
        if (charIdx < textToStream.length) {
          welcomeBubble.textContent += textToStream[charIdx];
          charIdx++;
          setTimeout(streamWelcome, 15);
        } else {
          // 完成后还原带 HTML 加粗格式的欢迎词
          welcomeBubble.innerHTML = `你好！我是你的主控面试教练。今天，我已为你集结了 <b style="color:#534ab7">岗位分析专家</b>、<b style="color:#534ab7">记忆检索专家</b>、<b style="color:#712b13">真题库MCP协议</b>以及 <b style="color:#e11d48">EVAL 量化评估 Agent</b>。我们将共同针对系统架构设计进行模拟实战。输入你的方案，我们将立即为你开辟时序 Trace 画布！`;
        }
      }
      streamWelcome();
    }
  });

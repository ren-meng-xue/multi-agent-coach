services:
  frontend:
    build:
      context: ./frontend
    container_name: coach-frontend
    restart: unless-stopped
    env_file:
      - path: .env.deploy
        required: false
    environment:
      BACKEND_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: ""
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

  backend:
    image: multi-agent-coach-backend
    build:
      context: ./backend
    container_name: coach-backend
    restart: unless-stopped
    env_file:
      - path: .env.deploy
        required: false
    environment:
      APP_ENV: prod
      DATABASE_URL: postgresql+asyncpg://coach:coach@postgres:5432/coach
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: '["http://localhost:3000"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health', timeout=5)\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  worker:
    image: multi-agent-coach-backend
    container_name: coach-worker
    restart: unless-stopped
    env_file:
      - path: .env.deploy
        required: false
    environment:
      APP_ENV: prod
      DATABASE_URL: postgresql+asyncpg://coach:coach@postgres:5432/coach
      REDIS_URL: redis://redis:6379/0
    command: ["celery", "-A", "app.tasks.celery_app", "worker", "--loglevel=INFO"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    container_name: coach-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: coach
      POSTGRES_PASSWORD: coach
      POSTGRES_DB: coach
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coach -d coach"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: coach-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  redis-data:
